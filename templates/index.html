<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Rebrand — SoftwareOne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #080c14;
      --dark2: #0d1220;
      --dark3: #131929;
      --card: #111827;
      --border: rgba(255,255,255,0.08);
      --cyan: #00e5ff;
      --orange: #ff6a00;
      --red: #ff2d55;
      --green: #00d48a;
      --white: #ffffff;
      --muted: rgba(255,255,255,0.45);
      --text: rgba(255,255,255,0.88);
    }

    html, body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      overflow: hidden;
      background: var(--dark2);
      padding: 0;
      border-bottom: 1px solid var(--border);
    }

    .hero {
      position: relative;
      padding: 52px 48px 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
      flex-wrap: wrap;
    }

    /* light trail glow — purely CSS */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 70% 110%, rgba(0,229,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 120%, rgba(255,106,0,0.10) 0%, transparent 50%),
        radial-gradient(ellipse 40% 30% at 55% 130%, rgba(255,45,85,0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .glow-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--red) 15%,
        var(--orange) 35%,
        var(--cyan) 65%,
        transparent 100%);
      opacity: 0.7;
    }

    .logo-area { display: flex; flex-direction: column; gap: 4px; z-index: 1; }

    .swo-logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .swo-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--white);
      flex-shrink: 0;
    }

    .swo-badge svg { width: 32px; height: 32px; }

    .swo-wordmark { line-height: 1; }
    .swo-wordmark .small { font-size: 0.7rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
    .swo-wordmark .big   { font-size: 2rem; font-weight: 800; color: var(--white); letter-spacing: -0.5px; }

    .hero-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    .rebrand-badge {
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.8rem;
      color: var(--muted);
      backdrop-filter: blur(4px);
    }
    .rebrand-badge strong { color: var(--white); }
    .arrow-icon { color: var(--cyan); font-size: 1.1rem; }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* ── STEPS ── */
    .step-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .step-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #0099cc);
      color: var(--dark);
      font-weight: 800;
      font-size: 0.8rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-title { font-size: 1rem; font-weight: 600; color: var(--white); }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.14); }

    /* ── DROP ZONE ── */
    .drop-zone {
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(255,255,255,0.02);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--cyan);
      background: rgba(0,229,255,0.04);
    }
    .drop-zone input { display: none; }

    .upload-icon {
      width: 48px; height: 48px;
      margin: 0 auto 14px;
      background: rgba(0,229,255,0.1);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--cyan);
      font-size: 1.4rem;
    }

    .drop-zone p { color: var(--muted); font-size: 0.9rem; }
    .drop-zone .hint { font-size: 0.75rem; color: rgba(255,255,255,0.25); margin-top: 6px; }
    .drop-zone .file-name {
      font-weight: 600; color: var(--cyan);
      margin-top: 10px; font-size: 0.92rem;
    }
    .hidden { display: none !important; }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 26px;
      border-radius: 9px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
      letter-spacing: 0.01em;
    }
    .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #0099cc, var(--cyan));
      color: var(--dark);
      box-shadow: 0 4px 20px rgba(0,229,255,0.2);
    }
    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(0,229,255,0.35); }

    .btn-success {
      background: linear-gradient(135deg, #00a36c, var(--green));
      color: var(--dark);
      box-shadow: 0 4px 20px rgba(0,212,138,0.2);
    }
    .btn-success:hover:not(:disabled) { box-shadow: 0 6px 28px rgba(0,212,138,0.35); }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.1); }

    #extract-btn { margin-top: 18px; }

    /* ── IMAGE GRID ── */
    .select-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .select-bar .count-badge {
      margin-left: auto;
      background: rgba(0,229,255,0.1);
      color: var(--cyan);
      border: 1px solid rgba(0,229,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .images-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }

    .img-card {
      border: 2px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      background: rgba(255,255,255,0.03);
    }
    .img-card:hover { border-color: rgba(0,229,255,0.4); transform: translateY(-2px); }
    .img-card.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.15);
    }
    .img-card.selected .img-check { background: var(--cyan); border-color: var(--cyan); }
    .img-card.selected .img-check::after { display: block; }

    .img-preview {
      width: 100%; height: 100px;
      object-fit: contain;
      padding: 10px;
      background: rgba(255,255,255,0.02);
    }

    .img-footer {
      padding: 7px 10px;
      display: flex; align-items: center; gap: 8px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .img-check {
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.2);
      background: transparent;
      flex-shrink: 0; position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .img-check::after {
      content: '';
      display: none;
      position: absolute;
      left: 3px; top: 0px;
      width: 5px; height: 9px;
      border: 2px solid var(--dark);
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .img-label { font-size: 0.68rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── LOGO UPLOAD ── */
    .logo-row {
      display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }

    #logo-preview-wrap {
      display: none; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
    }
    #logo-preview {
      max-width: 100px; max-height: 50px;
      object-fit: contain; border-radius: 4px;
    }
    #logo-name { font-size: 0.78rem; color: var(--muted); }

    /* ── ALERTS ── */
    #status-area { margin-bottom: 4px; }
    .alert {
      padding: 13px 18px;
      border-radius: 10px;
      font-size: 0.86rem;
      margin-bottom: 16px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .alert-info    { background: rgba(0,100,255,0.12); border-left: 3px solid #4d90fe; color: #8ab4f8; }
    .alert-success { background: rgba(0,212,138,0.1);  border-left: 3px solid var(--green); color: #5dffc4; }
    .alert-error   { background: rgba(255,45,85,0.1);  border-left: 3px solid var(--red); color: #ff8fa3; }

    /* ── SPINNER ── */
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: var(--dark);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #step2, #step3 { display: none; }

    /* ── DIVIDER ── */
    .step-connector {
      width: 2px; height: 20px;
      background: linear-gradient(to bottom, var(--border), transparent);
      margin: 0 auto 0 13px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hero">
    <div class="logo-area">
      <div class="swo-logo">
        <div class="swo-badge">
          <!-- SoftwareOne circle "S" mark -->
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="48" fill="#003087"/>
            <text x="50" y="68" text-anchor="middle" font-family="Arial" font-weight="900" font-size="52" fill="white">S</text>
          </svg>
        </div>
        <div class="swo-wordmark">
          <div class="small">software</div>
          <div class="big">one</div>
        </div>
      </div>
      <div class="hero-sub">Template Rebrand · Automatisk logo- og bildebytte</div>
    </div>

    <div class="rebrand-badge">
      <strong>Crayon</strong>
      <span class="arrow-icon">→</span>
      <strong>SoftwareOne</strong>
    </div>
  </div>
  <div class="glow-line"></div>
</header>

<main>
  <div id="status-area"></div>

  <!-- STEG 1 -->
  <div class="card" id="step1">
    <div class="step-label">
      <div class="step-num">1</div>
      <div class="step-title">Last opp Office-malen</div>
    </div>
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept=".docx,.pptx,.xlsx,.xlsm,.xltx,.potx" />
      <div class="upload-icon">↑</div>
      <p>Klikk eller dra filen hit</p>
      <p class="hint">.docx &nbsp;·&nbsp; .pptx &nbsp;·&nbsp; .xlsx &nbsp;·&nbsp; .xlsm &nbsp;·&nbsp; .potx</p>
      <p class="file-name hidden" id="file-name-display"></p>
    </div>
    <button class="btn btn-primary" id="extract-btn" disabled onclick="extractImages()">
      Analyser bilder i filen
    </button>
  </div>

  <div class="step-connector"></div>

  <!-- STEG 2 -->
  <div class="card" id="step2">
    <div class="step-label">
      <div class="step-num">2</div>
      <div class="step-title">Velg bilder som skal byttes</div>
    </div>
    <div class="select-bar">
      <button class="btn btn-ghost" style="padding:7px 16px;font-size:0.8rem" onclick="selectAll()">Velg alle</button>
      <button class="btn btn-ghost" style="padding:7px 16px;font-size:0.8rem" onclick="selectNone()">Fjern alle</button>
      <div class="count-badge" id="selected-count">0 valgt</div>
    </div>
    <div class="images-grid" id="images-grid"></div>
  </div>

  <div class="step-connector"></div>

  <!-- STEG 3 -->
  <div class="card" id="step3">
    <div class="step-label">
      <div class="step-num">3</div>
      <div class="step-title">Last opp SoftwareOne-logo og generer</div>
    </div>
    <div class="logo-row">
      <button class="btn btn-ghost" onclick="document.getElementById('logo-input').click()">
        Velg logo-fil
      </button>
      <input type="file" id="logo-input" style="display:none" accept="image/*" onchange="previewLogo(this)" />
      <div id="logo-preview-wrap">
        <img id="logo-preview" src="" alt="Logo" />
        <span id="logo-name"></span>
      </div>
    </div>
    <button class="btn btn-success" id="replace-btn" style="margin-top:22px" disabled onclick="doReplace()">
      Generer rebrandet fil
    </button>
  </div>
</main>

<script>
  let sessionId = null;
  let fileExt = null;
  let selectedIds = new Set();

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(file) {
    const allowed = ['docx','pptx','xlsx','xlsm','xltx','potx'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (!allowed.includes(ext)) { showStatus('Ugyldig filtype.', 'error'); return; }
    document.getElementById('file-name-display').textContent = '📄 ' + file.name;
    document.getElementById('file-name-display').classList.remove('hidden');
    document.getElementById('extract-btn').disabled = false;
    fileInput._file = file;
    clearStatus();
  }

  function showStatus(msg, type = 'info') {
    const icons = { info: 'ℹ️', success: '✅', error: '❌' };
    document.getElementById('status-area').innerHTML =
      `<div class="alert alert-${type}">${icons[type]} ${msg}</div>`;
  }
  function clearStatus() { document.getElementById('status-area').innerHTML = ''; }

  async function extractImages() {
    const file = fileInput._file || fileInput.files[0];
    if (!file) return;
    const btn = document.getElementById('extract-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Analyserer…';

    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/extract', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.error) { showStatus(data.error, 'error'); resetBtn(btn, 'Analyser bilder i filen'); return; }
      sessionId = data.session_id;
      fileExt = data.ext;
      if (!data.images.length) { showStatus('Ingen bilder funnet i filen.', 'info'); resetBtn(btn, 'Analyser bilder i filen'); return; }
      renderImages(data.images);
      ['step2','step3'].forEach(id => document.getElementById(id).style.display = 'block');
      document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
      resetBtn(btn, 'Analyser bilder i filen');
      clearStatus();
    } catch (e) { showStatus('Noe gikk galt. Prøv igjen.', 'error'); resetBtn(btn, 'Analyser bilder i filen'); }
  }

  function resetBtn(btn, label) { btn.disabled = false; btn.textContent = label; }

  function renderImages(images) {
    const grid = document.getElementById('images-grid');
    grid.innerHTML = '';
    selectedIds.clear();
    images.forEach(img => {
      const card = document.createElement('div');
      card.className = 'img-card';
      card.dataset.id = img.id;
      card.innerHTML = `
        <img class="img-preview" src="data:${img.content_type};base64,${img.data}" alt="" />
        <div class="img-footer">
          <div class="img-check"></div>
          <span class="img-label">.${img.ext}</span>
        </div>`;
      card.addEventListener('click', () => toggleImage(img.id, card));
      grid.appendChild(card);
    });
    updateCount();
  }

  function toggleImage(id, card) {
    selectedIds.has(id) ? (selectedIds.delete(id), card.classList.remove('selected'))
                        : (selectedIds.add(id),    card.classList.add('selected'));
    updateCount(); updateReplaceBtn();
  }

  function selectAll() {
    document.querySelectorAll('.img-card').forEach(c => { selectedIds.add(c.dataset.id); c.classList.add('selected'); });
    updateCount(); updateReplaceBtn();
  }
  function selectNone() {
    selectedIds.clear();
    document.querySelectorAll('.img-card').forEach(c => c.classList.remove('selected'));
    updateCount(); updateReplaceBtn();
  }

  function updateCount() {
    document.getElementById('selected-count').textContent = `${selectedIds.size} valgt`;
  }

  function updateReplaceBtn() {
    const logoReady = !!document.getElementById('logo-input').files[0];
    document.getElementById('replace-btn').disabled = !(selectedIds.size > 0 && logoReady);
  }

  function previewLogo(input) {
    const file = input.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const wrap = document.getElementById('logo-preview-wrap');
      wrap.style.display = 'flex';
      document.getElementById('logo-preview').src = e.target.result;
      document.getElementById('logo-name').textContent = file.name;
    };
    reader.readAsDataURL(file);
    updateReplaceBtn();
  }

  async function doReplace() {
    if (!sessionId || !selectedIds.size) return;
    const logoFile = document.getElementById('logo-input').files[0];
    if (!logoFile) return;
    const btn = document.getElementById('replace-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Genererer…';

    const fd = new FormData();
    fd.append('session_id', sessionId);
    fd.append('ext', fileExt);
    fd.append('selected', JSON.stringify([...selectedIds]));
    fd.append('logo', logoFile);

    try {
      const res = await fetch('/replace', { method: 'POST', body: fd });
      if (!res.ok) { const e = await res.json(); showStatus(e.error || 'Feil.', 'error'); resetBtn(btn, 'Generer rebrandet fil'); return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const origName = (fileInput._file || fileInput.files[0]).name.replace(/(\.\w+)$/, '_rebranded$1');
      a.href = url; a.download = origName; a.click();
      URL.revokeObjectURL(url);
      showStatus(`Ferdig! <strong>${origName}</strong> er lastet ned.`, 'success');
      resetBtn(btn, 'Generer rebrandet fil');
      fetch('/cleanup', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id: sessionId}) });
    } catch (e) { showStatus('Noe gikk galt. Prøv igjen.', 'error'); resetBtn(btn, 'Generer rebrandet fil'); }
  }
</script>
</body>
</html>
